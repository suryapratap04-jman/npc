version: '3.8'

services:
  # Database for relational / structured tables
  db:
    image: postgres:16-alpine
    container_name: resource-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resource_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Vector Database for semantic profile similarity searches
  qdrant:
    image: qdrant/qdrant:latest
    container_name: resource-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # Local LLM orchestrator (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: resource-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  # FastAPI Backend API & Decision Engines
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: resource-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/resource_db
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - LLM_PROVIDER=ollama
      - OLLAMA_MODEL=qwen2.5:7b
      - RUNNING_IN_DOCKER=true
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  ollama_data:
